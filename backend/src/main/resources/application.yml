server:
  port: ${PORT:8080}

spring:
  application:
    name: backend
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  expiration-ms: 86400000
  temp-expiration-ms: 600000

kakao:
  rest-api-key: ${KAKAO_REST_API_KEY:dummy}

upstage:
  api-key: ${UPSTAGE_API_KEY:}

file:
  upload-dir: ./uploads

app:
  dev-login:
    enabled: ${ENABLE_DEV_LOGIN:false}
