server:
  port: ${PORT:8080}

spring:
  application:
    name: backend
  profiles:
    active: dev
  servlet:
    multipart:
      # 폰 카메라 사진은 장당 몇 MB씩 되고, 오답노트 등록은 여러 장을 한 요청으로 올리므로
      # 넉넉하게 잡는다 (사진 한 장 최대 15MB, 한 번에 올리는 전체 요청은 최대 80MB).
      max-file-size: 15MB
      max-request-size: 80MB

jwt:
  expiration-ms: 86400000
  temp-expiration-ms: 600000

kakao:
  rest-api-key: ${KAKAO_REST_API_KEY:dummy}

upstage:
  api-key: ${UPSTAGE_API_KEY:}

file:
  upload-dir: ./uploads

app:
  dev-login:
    enabled: ${ENABLE_DEV_LOGIN:false}
