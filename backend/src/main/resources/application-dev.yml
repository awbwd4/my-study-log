server:
  port: 8081

spring:
  datasource:
    url: jdbc:h2:file:./data/mystudylog;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true

jwt:
  secret: ${JWT_SECRET:dev-only-local-secret-please-override-32bytes-min}

app:
  cors:
    allowed-origins: http://localhost:5173
